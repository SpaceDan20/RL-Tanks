behaviors:
  TankyBrain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 50000
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.005
        encoding_size: 256
        learning_rate: 0.0003
    self_play:
      save_steps: 20000
      team_change: 100000
      swap_steps: 10000
      window: 10
      play_against_latest_model_ratio: 0.5
      initial_elo: 1200.0
    max_steps: 1000000 # ~700k steps/hr for unity editor
    time_horizon: 256
    summary_freq: 5000
    checkpoint_interval: 50000

environment_parameters:
  stages:
    curriculum:
      - name: level_1a # 10m spawns in level 1 rooms
        completion_criteria:
          measure: reward
          behavior: TankyBrain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 1.0
        value: 0.0
      - name: level_1b # 25m spawns in level 1 rooms
        completion_criteria:
          measure: reward
          behavior: TankyBrain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 1.5
        value: 0.5
      - name: level_1c # 50m spawns in level 1 rooms
        completion_criteria:
          measure: reward
          behavior: TankyBrain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 1.8
        value: 1.0
      - name: capture_and_combat # move to the main battlefield. fights on!
        completion_criteria:
          measure: reward
          behavior: TankyBrain
          signal_smoothing: true
          min_lesson_length: 100
          threshold: 2.0
        value: 2.0
      - name: capture_and_combat_far # advance from medium to far spawns
        value: 3.0
