behaviors:
  WheelyBrain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 50000
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.005
        encoding_size: 256
        learning_rate: 0.0003

    max_steps: 750000
    time_horizon: 64
    summary_freq: 5000
    checkpoint_interval: 50000